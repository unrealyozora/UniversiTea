<tr>

    <th scope="row">{{NOME}}</th>
    <td data-title="ID">{{ID}}</td>
    <td data-title="Prezzo">€ {{PREZZO}}</td>
    <td data-title="Disponibilità">{{DISPONIBILITA}} pz.</td>
    <td data-title="Categoria">{{CATEGORIA}}</td>
    <td class="actions" data-title="Azioni">
        <div class="action-buttons">
            <a href="edit_product.php?id={{ID}}" class="btn-table btn-edit" aria-label="Modifica {{NOME}}">
                Modifica
            </a>

            <form action="../config/delete_product.php" method="POST" onsubmit="return confirm('Sei sicuro di voler eliminare {{NOME}}?');">
                <input type="hidden" name="id" value="{{ID}}">
                <button type="submit" class="btn-table btn-delete" aria-label="Elimina {{NOME}}">Elimina</button>
            </form>
        </div>
    </td>
</tr>
