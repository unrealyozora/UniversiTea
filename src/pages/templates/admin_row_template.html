<tr>
    <td>{{ID}}</td>
    <th scope="row">{{NOME}}</th>
    <td>€ {{PREZZO}}</td>
    <td>{{DISPONIBILITA}} pz.</td>
    <td>{{CATEGORIA}}</td>
    <td class="actions">
        <a href="edit_product.php?id={{ID}}" class="btn-edit" aria-label="Modifica {{NOME}}">
            ✏️ Modifica
        </a>

        <form action="../config/delete_product.php" method="POST" onsubmit="return confirm('Sei sicuro di voler eliminare {{NOME}}?');" style="display:inline;">
            <input type="hidden" name="id" value="{{ID}}">
            <button type="submit" class="btn-delete" aria-label="Elimina {{NOME}}">🗑️</button>
        </form>
    </td>
</tr>
